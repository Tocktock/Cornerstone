name: backend-ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_DB: cornerstone
          POSTGRES_USER: cornerstone
          POSTGRES_PASSWORD: cornerstone
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cornerstone -d cornerstone"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: postgresql+psycopg://cornerstone:cornerstone@localhost:5432/cornerstone
      PERSISTENCE_BACKEND: postgres
      PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
      RUN_POSTGRES_TESTS: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install package and dev dependencies
        run: python -m pip install -e '.[dev]'
      - name: Run strict live PostgreSQL verification
        run: python scripts/run_live_postgres_tests.py
      - name: Run non-PostgreSQL backend checks
        run: RUN_POSTGRES_TESTS=0 ./scripts/run_tests.sh --ignore=tests/postgres
