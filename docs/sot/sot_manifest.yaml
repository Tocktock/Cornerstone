  csv: "docs/scenario-contracts/SCENARIO_MATRIX_FULL.csv"
  scenario_count: 206

cli_native_first:
  contract: "docs/scenario-contracts/CLI_NATIVE_FIRST_CONTRACT.md"
  feature_parity_matrix: "docs/scenario-contracts/CLI_FEATURE_PARITY_MATRIX.csv"
  authority: "mandatory execution overlay: no CLI, no feature PASS"
  release_gate: "Every product feature must have a verified native cornerstone CLI path or be explicitly classified as a non-feature implementation internal."
  verification_command: "scripts/verify_cli_native_first_docs.sh"

local_verification_plane:
  contract: "docs/scenario-contracts/LOCAL_VERIFICATION_PLANE_V0.md"
  authority: "local scenario verification, fixture corpus, model harness, deterministic validators, CLI-native evidence, and release gating"
  product_entrypoint: "cornerstone scenario verify <contract> --json"
  baseline_model_provider: "local_test"
  llm_rule: "LLM output alone never proves PASS; deterministic validators judge durable evidence"
  verification_command: "scripts/verify_local_verification_plane_docs.sh"

vs0_scaffold:
  contract: "docs/scenario-contracts/VS0_SCAFFOLD_CONTRACT.md"
  authority: "setup-planning contract before VS-0 scaffold implementation or feature coding"
  runtime_targets:
    python: "3.14.x"
    node: "24.x LTS"
    postgres: "18.x"
  dependency_policy: "latest compatible, lockfile-pinned, human approval required before adding production dependencies"
  cli_requirement: "cornerstone CLI planned from day 0; no CLI, no feature PASS"
  verification_template: "docs/verification-reports/template.md"
  adr_files:
    - "docs/adr/ADR-0002-framework-and-version-policy.md"
    - "docs/adr/ADR-0003-monorepo-setup.md"
    - "docs/adr/ADR-0004-cli-native-first-setup.md"
    - "docs/adr/ADR-0005-domain-boundaries.md"
    - "docs/adr/ADR-0006-agent-guide.md"

technical_defaults:
  file: "docs/sot/03_TECHNICAL_ARCHITECTURE_DEFAULTS.md"
  authority: "implementation defaults only where compatible with product SoT"
  defaults:
    durable_state: "PostgreSQL-first"
    tenant_isolation: "RLS + service/policy checks"
    search: "Postgres FTS + pgvector"
    policy: "OPA/Rego-compatible"
    audit: "append-only tamper-evident"
    connector_boundary: "ConnectorHub-mediated"
    model_access: "provider-neutral router"
    local_start: "one-command local/on-prem target"

first_implementation_contract:
  file: "docs/scenario-contracts/VS0_IMPLEMENTATION_CONTRACT.md"
  goal: "personal messy input -> immutable artifact -> search -> evidence-backed brief -> claim -> action card dry-run/approval/execution -> audit"
  scenario_count: 58
  source_package_file: "docs/scenario-contracts/VS0_IMPLEMENTATION_CONTRACT_STRICT.md"

agent_guidance:
  scenario_first_instruction: "docs/agent/SCENARIO_FIRST_AGENT_INSTRUCTION.md"
  project_constitution: "docs/agent/PROJECT_OPERATING_CONSTITUTION.md"
  handoff: "docs/handoff/AI_AGENT_HANDOFF_V2_FULL_WITH_MUST_PASS_EMBEDDED.md"

deprecated:
  - file: "project-sot.md"
    treatment: "archive as superseded; extract compatible technical defaults only"
  - phrase: "This document is the only SoT"
    treatment: "replace with SoT bundle authority order"
  - phrase: "freight & logistics as core identity"
    treatment: "replace with general-purpose personal-first + organization expansion; logistics optional solution pack"

verification:
  command: "scripts/verify_sot_docs.sh"
  cli_native_first_command: "scripts/verify_cli_native_first_docs.sh"
  local_verification_plane_command: "scripts/verify_local_verification_plane_docs.sh"
  release_rule: "No PASS without concrete scenario evidence. No CLI, no feature PASS."
