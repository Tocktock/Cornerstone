name: Dependency Complete Verification

on:
  pull_request:
    paths:
      - ".github/workflows/dependency-complete-verification.yml"
      - "alembic.ini"
      - "migrations/**"
      - "pyproject.toml"
      - "scripts/**"
      - "src/**"
      - "tests/**"
      - "docs/**"
  push:
    branches:
      - main

jobs:
  dependency-complete-verification:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_DB: cornerstone
          POSTGRES_USER: cornerstone
          POSTGRES_PASSWORD: cornerstone
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U cornerstone -d cornerstone"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      PERSISTENCE_BACKEND: postgres
      RUN_POSTGRES_TESTS: "1"
      DATABASE_URL: postgresql+psycopg://cornerstone:cornerstone@localhost:5432/cornerstone
      PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install package with dev dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'

      - name: Render dependency-complete command plan
        run: python scripts/run_dependency_complete_verification.py --plan-only --print-plan

      - name: Run strict dependency-complete verification
        run: python scripts/run_dependency_complete_verification.py --strict --confirm-live-db

      - name: Upload verification reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-complete-verification-reports
          path: reports/
