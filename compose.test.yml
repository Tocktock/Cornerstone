services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cornerstone_test}
      POSTGRES_USER: ${POSTGRES_USER:-cornerstone}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cornerstone}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "${TEST_DB_PORT:-55433}:5432"
    volumes:
      - postgres_test_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    environment:
      CORNERSTONE_DATABASE_URL: ${CORNERSTONE_TEST_DATABASE_URL:-postgresql+psycopg://cornerstone:cornerstone@db:5432/cornerstone_test}
      CORNERSTONE_FIXTURE_ROOT: /workspace/fixtures
      CORNERSTONE_WORKSPACE_SOURCE_ROOT: /workspace/fixtures/minimal/workspace/member-visible
      CORNERSTONE_PERSONAL_SOURCE_ROOT: /workspace/fixtures/minimal/personal/member-private
      CORNERSTONE_NOTION_FIXTURE_ROOT: /workspace/fixtures/notion
      CORNERSTONE_CORPUS_SOURCE_ROOT: /workspace/sample-data/sendy-knowledge
      CORNERSTONE_AUTO_SEED_DEMO: "true"
      CORNERSTONE_RESET_DATABASE_ON_START: "true"
      CORNERSTONE_FIXED_NOW: ${CORNERSTONE_FIXED_NOW:-2026-04-06T09:00:00+09:00}
      CORNERSTONE_FRONTEND_BASE_URL: ${CORNERSTONE_FRONTEND_BASE_URL:-http://localhost:4173}
      CORNERSTONE_NOTION_DEMO_OAUTH_MODE: ${CORNERSTONE_NOTION_DEMO_OAUTH_MODE:-true}
      CORNERSTONE_NOTION_CLIENT_ID: ${CORNERSTONE_NOTION_CLIENT_ID:-}
      CORNERSTONE_NOTION_CLIENT_SECRET: ${CORNERSTONE_NOTION_CLIENT_SECRET:-}
      CORNERSTONE_NOTION_OAUTH_REDIRECT_URI: ${CORNERSTONE_NOTION_OAUTH_REDIRECT_URI:-}
      CORNERSTONE_CORS_ORIGINS: ${CORNERSTONE_CORS_ORIGINS:-["http://localhost:4173"]}
    command: ["uvicorn", "cornerstone.main:app", "--host", "0.0.0.0", "--port", "8000"]
    volumes:
      - ./backend:/app
      - ./backend/fixtures:/workspace/fixtures:ro
      - ./sample-data:/workspace/sample-data:ro
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      target: dev
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000/api/v1}
      VITE_FRONTEND_BASE_URL: ${CORNERSTONE_FRONTEND_BASE_URL:-http://localhost:4173}
    command: ["npx", "vite", "--host", "0.0.0.0", "--port", "4173"]
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      backend:
        condition: service_started
    ports:
      - "4173:4173"

volumes:
  postgres_test_data:
